<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 10px; max-width: 400px; }
        h1 { color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0 16px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        a { color: #999; text-decoration: none; margin-left: 15px; }
        label { font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h1 th:text="${user.id} ? '✏️ Edit User' : '➕ Add New User'"></h1>

    <form th:action="@{/users/save}" th:object="${user}" method="post">
        <!-- Edit এর সময় ID পাঠাও -->
        <input type="hidden" th:field="*{id}"/>

        <label>Name:</label>
        <input type="text" th:field="*{name}" placeholder="Enter name" required/>

        <label>Email:</label>
        <input type="email" th:field="*{email}" placeholder="Enter email" required/>

        <button type="submit">💾 Save</button>
        <a th:href="@{/users}">Cancel</a>
    </form>
</div>

</body>
</html>
