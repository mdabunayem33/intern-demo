<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Users</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #4CAF50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f1f1f1; }
        a { color: #4CAF50; text-decoration: none; margin-right: 10px; }
        a.delete { color: red; }
        .btn { background: #4CAF50; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>

<h1>👥 All Users</h1>
<a class="btn" th:href="@{/users/new}">+ Add New User</a>
<br><br>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.email}"></td>
        <td>
            <a th:href="@{/users/{id}(id=${user.id})}">👁 Details</a>
            <a th:href="@{/users/edit/{id}(id=${user.id})}">✏️ Edit</a>
            <a class="delete" th:href="@{/users/delete/{id}(id=${user.id})}"
               onclick="return confirm('Delete this user?')">🗑 Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
